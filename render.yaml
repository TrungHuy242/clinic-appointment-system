# Render.com Blueprint — Backend + Frontend (dùng Neon DB có sẵn)
services:
  # ── Backend API (Docker container, Free tier) ──────────────────────────────────
  - type: web
    name: clinic-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/health/
    envVars:
      - key: DB_ENGINE
        value: postgresql
      - key: DB_HOST
        value: dpg-d7oqgsho3t8c7386b0jg-a.db.render.com
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: clinic_db_48rj
      - key: DB_USER
        value: clinic_user
      - key: DB_PASSWORD
        sync: false
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SEED_DEMO_DATA
        value: "true"
    autoDeploy: true

  # ── Frontend (Docker container, Free tier) ────────────────────────────────────
  - type: web
    name: clinic-frontend
    env: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    healthCheckPath: /
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://clinic-backend.onrender.com/api
    autoDeploy: true